<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaLocal — Offline Translator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="dark">

  <!-- ═══════════════════ BACKGROUND ORBS ═══════════════════ -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🌍</span>
        <div class="logo-text">
          <span class="logo-name">LinguaLocal</span>
          <span class="logo-tag">Offline Translator</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="historyToggle" aria-label="Translation history" title="History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button class="btn-icon" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ═══════════════════ MAIN ═══════════════════ -->
  <main class="main">

    <!-- Language selector bar -->
    <div class="lang-bar glass-card">
      <div class="lang-select-wrap">
        <label class="lang-label" for="sourceLang">From</label>
        <select class="lang-select" id="sourceLang">
          <option value="en">🇬🇧 English</option>
          <option value="so">🇸🇴 Somali</option>
          <option value="ar">🇸🇦 Arabic</option>
          <option value="fr">🇫🇷 French</option>
        </select>
      </div>

      <button class="btn-swap" id="swapLangs" aria-label="Swap languages" title="Swap languages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
      </button>

      <div class="lang-select-wrap">
        <label class="lang-label" for="targetLang">To</label>
        <select class="lang-select" id="targetLang">
          <option value="so">🇸🇴 Somali</option>
          <option value="en">🇬🇧 English</option>
          <option value="ar">🇸🇦 Arabic</option>
          <option value="fr">🇫🇷 French</option>
        </select>
      </div>
    </div>

    <!-- Translation panels -->
    <div class="panels">

      <!-- Source panel -->
      <div class="panel glass-card" id="sourcePanel">
        <div class="panel-header">
          <span class="panel-lang-label" id="sourcePanelLabel">English</span>
          <div class="panel-actions">
            <span class="char-count" id="charCount">0 / 2000</span>
            <button class="btn-small" id="clearBtn" title="Clear text">Clear</button>
          </div>
        </div>
        <textarea
          id="sourceText"
          class="text-area"
          placeholder="Type or paste text to translate…"
          maxlength="2000"
          aria-label="Source text"
          spellcheck="true"
          autofocus
        ></textarea>
        <div class="panel-footer">
          <span class="hint-text">Supports phrases, sentences, and individual words</span>
        </div>
      </div>

      <!-- Translate button (mobile: between panels; desktop: within flow) -->
      <div class="translate-btn-wrap">
        <button class="btn-translate" id="translateBtn" aria-label="Translate">
          <span class="btn-translate-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            <span class="btn-translate-text">Translate</span>
          </span>
          <div class="btn-loader hidden" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </button>
      </div>

      <!-- Target panel -->
      <div class="panel glass-card" id="targetPanel">
        <div class="panel-header">
          <span class="panel-lang-label" id="targetPanelLabel">Somali</span>
          <div class="panel-actions">
            <button class="btn-small" id="copyBtn" title="Copy translation" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
          </div>
        </div>
        <div class="text-output" id="outputText" aria-live="polite" aria-label="Translation output">
          <span class="output-placeholder">Translation will appear here…</span>
        </div>
        <div class="panel-footer" id="translationMeta" style="display:none">
          <span class="meta-chip" id="wordCountMeta"></span>
          <span class="meta-chip" id="timeMeta"></span>
        </div>
      </div>

    </div>

    <!-- Status / error banner -->
    <div class="status-banner hidden" id="statusBanner" role="alert">
      <span id="statusText"></span>
      <button class="btn-dismiss" id="dismissStatus" aria-label="Dismiss">✕</button>
    </div>

    <!-- Quick-phrases shortcuts -->
    <div class="quick-phrases glass-card">
      <div class="quick-header">
        <span class="quick-title">Quick Phrases</span>
        <span class="quick-subtitle">Click to auto-fill</span>
      </div>
      <div class="quick-grid" id="quickPhrases">
        <button class="quick-chip" data-phrase="Hello">Hello</button>
        <button class="quick-chip" data-phrase="Thank you">Thank you</button>
        <button class="quick-chip" data-phrase="How are you">How are you</button>
        <button class="quick-chip" data-phrase="Good morning">Good morning</button>
        <button class="quick-chip" data-phrase="I need help">I need help</button>
        <button class="quick-chip" data-phrase="Where is the bathroom">Where is the bathroom</button>
        <button class="quick-chip" data-phrase="I love you">I love you</button>
        <button class="quick-chip" data-phrase="Goodbye">Goodbye</button>
        <button class="quick-chip" data-phrase="How much does it cost">How much does it cost</button>
        <button class="quick-chip" data-phrase="Call the police">Call the police</button>
      </div>
    </div>

  </main>

  <!-- ═══════════════════ HISTORY DRAWER ═══════════════════ -->
  <aside class="history-drawer" id="historyDrawer" aria-label="Translation history" hidden>
    <div class="drawer-header">
      <h2 class="drawer-title">History</h2>
      <div class="drawer-actions">
        <button class="btn-small danger" id="clearHistory">Clear all</button>
        <button class="btn-icon" id="closeHistory" aria-label="Close history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No translations yet.</div>
    </div>
  </aside>
  <div class="drawer-overlay hidden" id="drawerOverlay"></div>

  <!-- ═══════════════════ COPY TOAST ═══════════════════ -->
  <div class="toast hidden" id="copyToast" aria-live="polite">
    ✅ Copied to clipboard!
  </div>

  <script src="script.js"></script>
</body>
</html>
